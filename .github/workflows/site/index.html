<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Small Doc Studio — character-led storytelling across documentary, sport and branded content." />
  <title>Small Doc Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="nav" role="banner">
  <div class="container nav-inner">
    <a href="#top" class="brand" aria-label="Small Doc Studio home">
      <img src="assets/logo.svg" alt="Small Doc Studio logo" class="logo" />
    </a>

    <nav class="main-nav" role="navigation" aria-label="Primary">
      <a href="#work">Work</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>

<main id="top">
  <section class="hero" aria-label="Hero">
    <img src="assets/work1.svg" alt="Filmmaking still" class="hero-bg" />

    <div class="hero-overlay container">
      <h1>Stories that matter.</h1>
      <p>Documentary • Sport • Branded</p>
      <p><a class="cta" href="#work">View selected work</a></p>
    </div>
  </section>

  <section id="work" class="section container" aria-labelledby="work-heading">
    <h2 id="work-heading">Selected Work</h2>

    <div class="work-grid" aria-hidden="false">
      <div class="work-item">
        <img src="assets/work1.svg" alt="Selected project 1" />
      </div>

      <div class="work-item">
        <img src="assets/work2.svg" alt="Selected project 2" />
      </div>

      <div class="work-item">
        <img src="assets/work1.svg" alt="Selected project 3" />
      </div>
    </div>
  </section>

  <section id="about" class="section section-light container" aria-labelledby="about-heading">
    <h2 id="about-heading">About</h2>
    <p>
      Small Doc Studio is a production company focused on character-led storytelling across documentary,
      sport and branded content.
    </p>
  </section>

  <section id="contact" class="section container" aria-labelledby="contact-heading">
    <h2 id="contact-heading">Contact</h2>
    <p><a href="mailto:hello@smalldoc.co.uk">hello@smalldoc.co.uk</a></p>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    <p>© 2026 Small Doc Studio</p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
